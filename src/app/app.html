<mat-sidenav-container class="example-container">
    <mat-sidenav #sidenav mode="side" opened="true" class="example-sidenav">
        <div class="side-bar-title">
            <h2>Categories</h2>
        </div>
        <mat-nav-list>
            <a class="side-bar-item" mat-list-item routerLink="/angular">Angular</a>
            <a class="side-bar-item" mat-list-item routerLink="/typescript">TypeScript</a>
            <a class="side-bar-item" mat-list-item routerLink="/javascript">JavaScript</a>
            <a class="side-bar-item" mat-list-item routerLink="/rxjs">RxJS</a>
        </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
        <mat-toolbar color="primary">
            <a mat-list-item routerLink="/home">Interview Preparation</a>
        </mat-toolbar>
        <main>
            <!-- місце де ангуляр рендерить компоненти по шляхам -->
            <div *ngIf="loading" style="padding: 20px;">Loading...</div>
            <router-outlet></router-outlet>
        </main>
    </mat-sidenav-content>
</mat-sidenav-container>
